<li id="contact-{{ contact.id }}">
    <span>{{ contact.title }} - {{ contact.name }} - {{ contact.email }}</span>
    
    <button class="btn btn-primary"
    hx-post="{% url 'update' contact.id %}"
    hx-swap="outerHTML"
    hx-target="#contact-{{ contact.id }}"
    >Edit</button>
    
    <button class="btn btn-secondary"
    hx-delete="{% url 'delete' contact.id %}"
    hx-swap="outerHTML"
    hx-target="#contact-{{ contact.id }}"
    >Delete</button>
</li>
